<!DOCTYPE html>
<html>
<head>
  <title>Sales Dashboard Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">

<div class="container text-center">
  <div class="card shadow p-4 col-md-4 mx-auto">
    <h4>🔐 ระบบวิเคราะห์ยอดขาย</h4>
    <input type="password" id="password" class="form-control my-3" placeholder="รหัสผ่าน">
    <button class="btn btn-primary w-100" onclick="login()">เข้าสู่ระบบ</button>
  </div>
</div>

<script>
function login(){
  const pass = document.getElementById("password").value;
  if(pass === "753951"){
    window.location.href="dashboard.html";
  }else{
    alert("รหัสผ่านไม่ถูกต้อง");
  }
}
</script>
</body>
</html>
